  select, textarea, input {

  button {

let currentLang = localStorage.getItem('otc_lang') || 'en';

const categorySelect = document.getElementById('category');
const topicEl = document.getElementById('topic');
const apiKeyInput = document.getElementById('apiKey');

function rebuildCategorySelect() {
  categorySelect.innerHTML = '';
  const allOpt = document.createElement('option');
  allOpt.value = 'all';
  allOpt.textContent = i18n[currentLang].allCategories;
  categorySelect.appendChild(allOpt);
  Object.keys(categoryLabels[currentLang]).forEach(id => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = categoryLabels[currentLang][id];
    categorySelect.appendChild(opt);
  });
}

function applyLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('otc_lang', lang);
  document.getElementById('langEN').classList.toggle('active', lang === 'en');
  document.getElementById('langTR').classList.toggle('active', lang === 'tr');
  const t = i18n[lang];
  document.getElementById('titleEl').textContent = t.title;
  document.getElementById('subtitleEl').textContent = t.subtitle;
  document.getElementById('apiKeyLabel').textContent = t.apiKeyLabel;
  document.getElementById('categoryLabel').textContent = t.categoryLabel;
  rebuildCategorySelect();
  topicEl.textContent = t.topicPlaceholder;
  document.getElementById('newTopicBtn').innerHTML = t.newTopicBtn;
  if (!(mediaRecorder && mediaRecorder.state === 'recording')) {
    recordBtn.textContent = t.startRecording;
  }
  document.getElementById('captionLabelText').textContent = t.captionToggle;
  document.getElementById('transcriptLabel').textContent = t.transcriptLabel;
  document.getElementById('transcript').placeholder = t.transcriptPlaceholder;
  document.getElementById('feedbackBtn').textContent = t.getFeedbackBtn;
  document.getElementById('legendGoodText').textContent = t.legendGood;
  document.getElementById('legendImproveText').textContent = t.legendImprove;
  lastTopic = null;
}

document.getElementById('langEN').onclick = () => applyLanguage('en');
document.getElementById('langTR').onclick = () => applyLanguage('tr');

function getTopicPool() {
  const cat = categorySelect.value;
  const pool = topicsByLang[currentLang];
  if (cat === 'all') return Object.values(pool).flat();
  return pool[cat];
}

// ---------- Web Audio: casino tick / chime ----------
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTick(freq) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = freq;
    osc.type = 'square';
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.09);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.09);
  } catch (e) {}
}
function playChime() {
  try {
    const ctx = getAudioCtx();
    [880, 1174].forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = f;
      osc.type = 'sine';
      const t0 = ctx.currentTime + i * 0.12;
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(0.22, t0 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.45);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + 0.45);
    });
  } catch (e) {}
}

// ---------- Slot-style topic spin ----------
let spinning = false;
let lastTopic = null;

document.getElementById('newTopicBtn').onclick = () => {
  if (spinning) return;
  spinning = true;
  const pool = getTopicPool();
  const candidates = pool.length > 1 ? pool.filter(t => t !== lastTopic) : pool;
  const finalTopic = candidates[Math.floor(Math.random() * candidates.length)];
  lastTopic = finalTopic;
  topicEl.classList.add('spinning');
  document.getElementById('transcriptCard').classList.add('hidden');
  document.getElementById('feedbackCard').classList.add('hidden');

  let step = 0;
  const totalSteps = 34;
  function spinStep() {
    if (step >= totalSteps) {
      topicEl.textContent = finalTopic;
      topicEl.classList.remove('spinning');
      spinning = false;
      playChime();
      return;
    }
    topicEl.textContent = pool[Math.floor(Math.random() * pool.length)];
    playTick(500 + Math.random() * 300);
    step++;
    const progress = step / totalSteps;
    const delay = 45 + Math.pow(progress, 3) * 480;
    setTimeout(spinStep, delay);
  }
  spinStep();
};

// ---------- Live word-by-word captions (Web Speech API) ----------
let recognition = null;
let recognitionSupported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
const liveCaptionEl = document.getElementById('liveCaption');

function startLiveCaption() {
  const toggle = document.getElementById('captionToggle');
  if (!toggle.checked) return;
  if (!recognitionSupported) {
    document.getElementById('debugInfo').textContent = 'Live captions not supported in this browser.';
    return;
  }
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRec();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = currentLang === 'tr' ? 'tr-TR' : 'en-US';
  let finalText = '';
  liveCaptionEl.classList.remove('hidden');
  liveCaptionEl.innerHTML = '';
  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const piece = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalText += piece + ' ';
      else interim += piece;
    }
    const finalWords = finalText.trim().split(/\s+/).filter(Boolean)
      .map(w => '<span class="word">' + w + '</span>').join(' ');
    liveCaptionEl.innerHTML = finalWords + ' <span class="interim">' + interim + '</span>';
    liveCaptionEl.scrollTop = liveCaptionEl.scrollHeight;
  };
  recognition.onerror = (e) => {
    document.getElementById('debugInfo').textContent = 'Caption error: ' + e.error;
  };
  recognition.onend = () => {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      try { recognition.start(); } catch (e) {}
    }
  };
  try { recognition.start(); } catch (e) {
    document.getElementById('debugInfo').textContent = 'Caption failed to start: ' + e.message;
  }
}
function stopLiveCaption() {
  if (recognition) {
    recognition.onend = null;
    try { recognition.stop(); } catch (e) {}
  }
}

// ---------- Recording + timer ----------
let mediaRecorder, chunks = [], timerInterval, timeLeft = 60, overtime = false;
const recordBtn = document.getElementById('recordBtn');
const timerEl = document.getElementById('timer');

function formatTime(s) {
  const abs = Math.abs(s);
  const m = Math.floor(abs / 60), sec = abs % 60;
  return m + ':' + String(sec).padStart(2, '0');
}

function tick() {
  if (!overtime) {
    timeLeft--;
    if (timeLeft <= 0) {
      overtime = true;
      timeLeft = 0;
      timerEl.classList.add('overtime');
      recordBtn.classList.add('recording');
      recordBtn.textContent = i18n[currentLang].stopOvertime;
    }
    timerEl.textContent = formatTime(timeLeft);
  } else {
    timeLeft++;
    timerEl.textContent = '+' + formatTime(timeLeft);
  }
}

recordBtn.onclick = async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onerror = (e) => {
      document.getElementById('debugInfo').textContent = 'Recorder error: ' + (e.error ? e.error.message : e);
    };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      clearInterval(timerInterval);
      stopLiveCaption();
      recordBtn.textContent = i18n[currentLang].startRecording;
      recordBtn.classList.remove('recording');
      timerEl.classList.remove('overtime');
      const blob = new Blob(chunks, { type: 'audio/webm' });
      document.getElementById('debugInfo').textContent = i18n[currentLang].recordedSize((blob.size / 1024).toFixed(1));
      await transcribe(blob);
    };
    mediaRecorder.start();
    setTimeout(() => startLiveCaption(), 400);
    recordBtn.textContent = i18n[currentLang].stopRecording;
    recordBtn.classList.add('recording');
    timeLeft = 60;
    overtime = false;
    timerEl.classList.remove('overtime');
    timerEl.textContent = formatTime(timeLeft);
    timerInterval = setInterval(tick, 1000);
  } catch (e) {
    alert(i18n[currentLang].micDenied + e.message);
  }
};

async function transcribe(blob) {
  const key = apiKeyInput.value.trim();
  if (!key) { alert(i18n[currentLang].pasteKey); return; }
  const form = new FormData();
  form.append('file', blob, 'recording.webm');
  form.append('model', 'whisper-large-v3-turbo');
  form.append('language', currentLang === 'tr' ? 'tr' : 'en');
  document.getElementById('transcriptCard').classList.remove('hidden');
  document.getElementById('transcript').value = i18n[currentLang].transcribing;
  try {
    const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + key },
      body: form
    });
    const data = await res.json();
    document.getElementById('transcript').value = data.text || i18n[currentLang].couldNotTranscribe;
  } catch (e) {
    document.getElementById('transcript').value = 'Error: ' + e.message;
  }
}

// ---------- Deterministic linguistic metrics (grounds the scoring) ----------
function analyzeText(transcript) {
  const words = transcript.trim().split(/\s+/).filter(Boolean);
  const wordCount = Math.max(words.length, 1);
  const lower = transcript.toLowerCase();

  function countPhrases(list) {
    let total = 0;
    list.forEach(p => {
      const re = new RegExp('\\b' + p.replace(/ /g, '\\s+') + '\\b', 'g');
      const m = lower.match(re);
      if (m) total += m.length;
    });
    return total;
  }

  const fillerListEn = ['um','uh','er','ah','like','you know','kind of','sort of','actually','basically','literally','i mean'];
  const fillerListTr = ['ıı','şey','yani','işte','falan','filan','aslında','böyle'];
  const hedgeListEn = ['i think','i guess','maybe','probably','not sure','might','i suppose','i feel like'];
  const hedgeListTr = ['sanırım','galiba','belki','emin değilim','herhalde'];
  const transitionListEn = ['first','second','third','finally','however','because','therefore','for example','in addition','also','overall','in conclusion','moreover','furthermore','so then'];
  const transitionListTr = ['ilk olarak','ikinci olarak','ayrıca','fakat','ancak','çünkü','bu yüzden','örneğin','sonuç olarak','öncelikle'];

  const fillerCount = countPhrases(currentLang === 'tr' ? fillerListTr : fillerListEn);
  const hedgeCount = countPhrases(currentLang === 'tr' ? hedgeListTr : hedgeListEn);
  const transitionCount = countPhrases(currentLang === 'tr' ? transitionListTr : transitionListEn);

  const sentences = transcript.split(/[.!?]+/).map(s => s.trim()).filter(Boolean);
  const sentenceCount = Math.max(sentences.length, 1);
  const avgSentenceLength = +(wordCount / sentenceCount).toFixed(1);
  const uniqueWords = new Set(words.map(w => w.toLowerCase().replace(/[^a-zçğıöşü']/g, ''))).size;
  const uniqueRatio = +(uniqueWords / wordCount).toFixed(2);
  const fillerRate = +((fillerCount / wordCount) * 100).toFixed(1);

  return { wordCount, fillerCount, fillerRate, hedgeCount, transitionCount, sentenceCount, avgSentenceLength, uniqueRatio };
}

function baselineScores(m) {
  let clarity = 100 - Math.max(0, m.fillerCount - 1) * 4
    - (m.avgSentenceLength > 28 ? 12 : 0)
    - (m.avgSentenceLength < 6 ? 10 : 0)
    - (m.uniqueRatio < 0.45 ? 8 : 0);
  clarity = Math.max(0, Math.min(100, Math.round(clarity)));

  let structure = 25 + Math.min(m.transitionCount, 6) * 9 + (m.sentenceCount >= 4 ? 15 : 0);
  structure = Math.max(0, Math.min(100, Math.round(structure)));

  let presence = 100 - m.hedgeCount * 6 - Math.max(0, m.fillerCount - 2) * 3;
  presence = Math.max(0, Math.min(100, Math.round(presence)));

  return { clarity, structure, presence };
}

// ---------- Feedback ----------
document.getElementById('feedbackBtn').onclick = async () => {
  const key = apiKeyInput.value.trim();
  const topic = topicEl.textContent;
  const transcript = document.getElementById('transcript').value.trim();
  if (!key || !transcript) return;

  const feedbackCard = document.getElementById('feedbackCard');
  const scoreRow = document.getElementById('scoreRow');
  const feedbackText = document.getElementById('feedbackText');
  const highlightedBox = document.getElementById('highlightedTranscript');
  const metricsNote = document.getElementById('metricsNote');
  feedbackCard.classList.remove('hidden');
  scoreRow.innerHTML = '';
  feedbackText.textContent = i18n[currentLang].analyzing;
  highlightedBox.textContent = '';
  metricsNote.textContent = '';

  const m = analyzeText(transcript);
  const b = baselineScores(m);
  const outputLangInstruction = currentLang === 'tr'
    ? 'Write "overall_feedback" and highlight "note" fields in Turkish.'
    : 'Write "overall_feedback" and highlight "note" fields in English.';

  const prompt = `You are a rigorous speaking coach scoring a 1-minute impromptu speech. Be honest and specific, not generic or flattering. ${outputLangInstruction}

Topic: "${topic}"
Transcript: "${transcript}"

Computed linguistic metrics (calculated deterministically, use these as your PRIMARY scoring basis, not vibes):
- Word count: ${m.wordCount}
- Filler words: ${m.fillerCount} (${m.fillerRate}% of words)
- Hedging phrases: ${m.hedgeCount}
- Transition/structuring words: ${m.transitionCount}
- Sentences: ${m.sentenceCount}, average length: ${m.avgSentenceLength} words/sentence
- Vocabulary diversity (unique word ratio): ${m.uniqueRatio}

Baseline scores computed from a fixed rubric applied to these metrics:
- Clarity baseline: ${b.clarity} (penalizes filler rate, rambling or overly choppy sentences, low vocabulary diversity)
- Structure baseline: ${b.structure} (rewards transition words and enough sentences to show developed points)
- Presence baseline: ${b.presence} (penalizes hedging language and excess filler, which read as low confidence)

Your task: read the actual content and adjust each baseline by at most ±10 points based on things the formula cannot see — whether the answer was actually on-topic, whether ideas were developed with reasoning/examples or just listed, whether the logic holds together, whether the tone reads confident. Output the final adjusted integer score for each category. Do NOT round to multiples of 10 — use precise numbers (e.g. 74, 63, 88) that reflect the baseline plus your adjustment.

Respond with ONLY valid JSON, no markdown fences, no extra text, matching exactly this schema:
{
  "scores": {"clarity": <integer>, "structure": <integer>, "presence": <integer>},
  "overall_feedback": "<3-5 sentences, written as direct imperative instructions rather than describing what they did. Reference at least one specific number from the metrics above to justify a point.>",
  "highlights": [
    {"text": "<exact short substring copied verbatim from the transcript, 3-10 words>", "type": "good", "note": "<3-6 word reason>"},
    {"text": "<exact short substring copied verbatim from the transcript, 3-10 words>", "type": "improve", "note": "<3-6 word reason>"}
  ]
}
Include 2-4 "good" highlights and 2-4 "improve" highlights, each copied character-for-character from the transcript.`;

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'openai/gpt-oss-120b',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.3
      })
    });
    const data = await res.json();
    let raw = data.choices?.[0]?.message?.content || '{}';
    raw = raw.trim().replace(/^```json/, '').replace(/^```/, '').replace(/```$/, '').trim();
    const parsed = JSON.parse(raw);

    const t = i18n[currentLang];
    const labels = { clarity: t.clarity, structure: t.structure, presence: t.presence };
    scoreRow.innerHTML = Object.keys(labels).map(k => {
      const val = parsed.scores?.[k] ?? '-';
      const color = val >= 80 ? '#6ee7b7' : val >= 60 ? '#fbbf24' : '#fca5a5';
      return `<div class="score-box"><div class="score-num" style="color:${color}">${val}</div><div class="score-label">${labels[k]}</div></div>`;
    }).join('');

    feedbackText.textContent = parsed.overall_feedback || t.noFeedback;

    let highlighted = transcript;
    (parsed.highlights || []).forEach(h => {
      if (!h.text) return;
      const escaped = h.text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp(escaped);
      const cls = h.type === 'good' ? 'good' : 'improve';
      highlighted = highlighted.replace(re, `<mark class="${cls}" title="${(h.note || '').replace(/"/g, '')}">${h.text}</mark>`);
    });
    highlightedBox.innerHTML = highlighted;

    metricsNote.textContent = t.basedOn(m);
  } catch (e) {
    feedbackText.textContent = i18n[currentLang].errorParsing + e.message;
  }
};

apiKeyInput.value = localStorage.getItem('groq_api_key') || '';
apiKeyInput.addEventListener('input', () => localStorage.setItem('groq_api_key', apiKeyInput.value));
applyLanguage(currentLang);
